server {
    listen 4173;
    listen [::]:4173;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/javascript application/javascript application/x-javascript application/json application/wasm image/svg+xml font/woff2;

    # Static assets -- long cache (versioned by Vite hash)
    location ~* \.(?:css|js|mjs|wasm|ttf|woff2?)$ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Images and icons -- 1 week
    location ~* \.(?:png|jpg|jpeg|svg|webp|ico)$ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=604800";
    }

    # Other static files (map, json, gz, br, audio...)
    location ~* \.(?:map|json|mp3|flac|wav|ogg|gz|br|utf)$ {
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
